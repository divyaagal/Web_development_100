<!DOCTYPE html>
<html>
<head>
<title>Simple HTML Tags Example</title>
<style>
body{margin:0;padding:0;text-align:left;font-family:Arial}
</style>
</head>
<body>
<h1>Welcome to My Page</h1>
<h2>About Me</h2>
<p>This is a paragraph about me.</p>
<p><b>Bold Text</b></p>
<p><i>Italic Text</i></p>
<p><u>Underlined Text</u></p>
<a href="https://www.google.com">Go to Google</a>
<br>
<img src="https://via.placeholder.com/150" alt="Sample Image">
<h3>My Hobbies</h3>
<ul>
<li>Reading</li>
<li>Coding</li>
<li>Traveling</li>
</ul>
<h3>Steps</h3>
<ol>
<li>Wake up</li>
<li>Study</li>
<li>Sleep</li>
</ol>
<h3>Simple Table</h3>
<table border="1">
<tr><th>Name</th><th>Age</th></tr>
<tr><td>Rahul</td><td>20</td></tr>
<tr><td>Sneha</td><td>19</td></tr>
</table>
<h3>Contact Form</h3>
<form>
Name:<input type="text"><br>
Email:<input type="email"><br>
<input type="submit" value="Submit">
</form>
<hr>
<p>© 2026 My Website</p>
</body>
</html>
